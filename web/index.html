<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartNAS | 你的私有智能云</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            color-scheme: light;
            --blue: #1f6df2;
            --blue-2: #4fb3ff;
            --line: #dfe7f3;
            --muted: #64748b;
            --ink: #172033;
        }

        * {
            box-sizing: border-box;
        }

        body {
            background:
                radial-gradient(circle at 18% -8%, rgba(79, 179, 255, 0.16), transparent 28%),
                linear-gradient(180deg, #fbfdff 0%, #f4f7fb 100%);
            color: var(--ink);
            min-height: 100vh;
            letter-spacing: 0;
        }

        .topbar {
            height: 76px;
            border-bottom: 1px solid var(--line);
            background: rgba(255, 255, 255, 0.86);
            backdrop-filter: blur(18px);
        }

        .brand-mark {
            width: 44px;
            height: 32px;
            position: relative;
            flex: 0 0 auto;
        }

        .brand-mark span {
            position: absolute;
            border-radius: 999px;
            filter: drop-shadow(0 7px 14px rgba(31, 109, 242, 0.18));
        }

        .brand-mark span:nth-child(1) {
            width: 28px;
            height: 28px;
            left: 0;
            bottom: 0;
            background: linear-gradient(135deg, #56d2ff, #2284ff);
        }

        .brand-mark span:nth-child(2) {
            width: 31px;
            height: 31px;
            left: 13px;
            top: 0;
            background: linear-gradient(135deg, #55c8ff, #1765e8);
        }

        .brand-mark span:nth-child(3) {
            width: 29px;
            height: 24px;
            left: 22px;
            bottom: 0;
            background: linear-gradient(135deg, #3b91ff, #735cff);
        }

        .sidebar {
            width: 240px;
            border-right: 1px solid var(--line);
            background: rgba(255, 255, 255, 0.72);
        }

        .nav-item {
            height: 47px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 0 18px;
            color: #26364f;
            font-weight: 650;
            transition: all 0.18s ease;
        }

        .nav-item.active,
        .nav-item:hover {
            color: var(--blue);
            background: linear-gradient(90deg, rgba(31, 109, 242, 0.12), rgba(31, 109, 242, 0.04));
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.92);
            border-radius: 8px;
            border: 1px solid var(--line);
            box-shadow: 0 12px 32px rgba(31, 50, 86, 0.07);
        }

        .primary-btn,
        .ghost-btn,
        .icon-btn {
            border-radius: 8px;
            transition: all 0.18s ease;
        }

        .primary-btn {
            background: linear-gradient(135deg, #176df5, #0957de);
            color: white;
            box-shadow: 0 9px 20px rgba(31, 109, 242, 0.24);
        }

        .primary-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 12px 26px rgba(31, 109, 242, 0.3);
        }

        .ghost-btn {
            background: white;
            border: 1px solid var(--line);
            color: #21324b;
        }

        .ghost-btn:hover {
            border-color: #b9c9dd;
            background: #f8fbff;
        }

        .icon-btn {
            width: 34px;
            height: 34px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border: 1px solid transparent;
            color: #475569;
        }

        .icon-btn:hover {
            background: #f1f6ff;
            border-color: #cfddf1;
            color: var(--blue);
        }

        .metric-icon {
            width: 56px;
            height: 56px;
            border-radius: 999px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .upload-zone {
            min-height: 120px;
            border: 1.5px dashed #a9c7f8;
            background: rgba(255, 255, 255, 0.66);
            transition: all 0.18s ease;
        }

        .upload-zone:hover {
            border-color: var(--blue);
            background: #f8fbff;
        }

        .file-item {
            min-height: 58px;
        }

        .file-item:hover {
            background: #f8fbff;
        }

        .summary-text {
            display: -webkit-box;
            -webkit-line-clamp: 1;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .summary-pill {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            border-radius: 999px;
            padding: 2px 8px;
            font-size: 11px;
            font-weight: 700;
            white-space: nowrap;
        }

        .compact-toolbar {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .segmented {
            display: inline-flex;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: white;
            overflow: hidden;
        }

        .segmented button {
            padding: 8px 14px;
            font-size: 13px;
            font-weight: 650;
            color: #64748b;
        }

        .segmented button.active {
            background: #f1f6ff;
            color: var(--blue);
        }

        .action-menu {
            position: fixed;
            z-index: 80;
            min-width: 180px;
            background: white;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            box-shadow: 0 18px 40px rgba(15, 23, 42, 0.14);
            padding: 6px;
            display: none;
        }

        .action-menu.active {
            display: block;
        }

        .action-menu button {
            width: 100%;
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 10px;
            border-radius: 6px;
            color: #334155;
            font-size: 13px;
            text-align: left;
        }

        .action-menu button:hover {
            background: #f8fafc;
        }

        .action-menu button.danger {
            color: #dc2626;
        }

        .summary-ready {
            background: #ecfdf5;
            color: #047857;
        }

        .summary-empty {
            background: #f1f5f9;
            color: #64748b;
        }

        .summary-running {
            background: #eff6ff;
            color: #1d4ed8;
        }

        .summary-failed {
            background: #fef2f2;
            color: #dc2626;
        }

        /* 模态框样式 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            z-index: 50;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 8px;
            padding: 2rem;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            transform: translateY(-20px);
            opacity: 0;
            transition: all 0.3s ease;
        }

        .modal.active .modal-content {
            transform: translateY(0);
            opacity: 1;
        }

        .chat-panel {
            min-height: calc(100vh - 112px);
        }

        #chatHistory::-webkit-scrollbar,
        #file-list::-webkit-scrollbar {
            width: 8px;
        }

        #chatHistory::-webkit-scrollbar-thumb,
        #file-list::-webkit-scrollbar-thumb {
            background: #cbd8ea;
            border-radius: 999px;
        }

        @media (max-width: 1180px) {
            .sidebar {
                display: none;
            }
        }
    </style>
</head>

<body>
    <div class="min-h-screen">
        <!-- 顶部导航 -->
        <header class="topbar sticky top-0 z-40 flex items-center px-5 md:px-8">
            <div class="flex items-center gap-4 w-[240px] shrink-0">
                <div class="brand-mark" aria-hidden="true"><span></span><span></span><span></span></div>
                <h1 class="text-2xl font-black text-gray-950">SmartNAS</h1>
            </div>
            <div class="relative flex-1 max-w-xl ml-4 hidden md:block">
                <i class="fas fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-slate-500"></i>
                <input type="text" id="searchInput" oninput="applyFilterAndSort()" placeholder="搜索文件名或摘要"
                    class="w-full h-11 pl-11 pr-4 rounded-lg bg-white border border-slate-200 shadow-sm focus:ring-2 focus:ring-blue-100 focus:border-blue-400 focus:outline-none text-sm">
            </div>
            <div class="ml-auto flex items-center gap-3">
                <label class="primary-btn cursor-pointer h-11 px-5 hidden sm:flex items-center gap-2 text-sm font-bold">
                    <i class="fas fa-arrow-up-from-bracket"></i>
                    <span>上传文件</span>
                    <input type="file" id="fileInput" class="hidden" onchange="uploadFile(this)">
                </label>
                <button onclick="createFolder()" class="ghost-btn h-11 px-4 hidden sm:flex items-center gap-2 text-sm font-bold" title="新建文件夹">
                    <i class="far fa-square-plus"></i>
                    <span>新建文件夹</span>
                </button>
                <div id="user-info" class="flex items-center gap-3"></div>
            </div>
        </header>

        <!-- 登录模态框 -->
        <div id="loginModal" class="modal">
            <div class="modal-content relative">
                <button onclick="closeModal('loginModal')"
                    class="absolute top-4 right-4 text-gray-400 hover:text-gray-600"><i
                        class="fas fa-times"></i></button>
                <h2 class="text-2xl font-bold mb-6 text-gray-800">欢迎回来</h2>
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">用户名</label>
                        <input type="text" id="loginUser"
                            class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-400 focus:outline-none"
                            placeholder="输入用户名">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">密码</label>
                        <input type="password" id="loginPwd"
                            class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-400 focus:outline-none"
                            placeholder="输入密码">
                    </div>
                    <button onclick="submitLogin()"
                        class="w-full bg-blue-600 text-white font-bold py-2 rounded-lg hover:bg-blue-700 transition mt-4">登录</button>
                </div>
            </div>
        </div>

        <!-- 注册模态框 -->
        <div id="registerModal" class="modal">
            <div class="modal-content relative">
                <button onclick="closeModal('registerModal')"
                    class="absolute top-4 right-4 text-gray-400 hover:text-gray-600"><i
                        class="fas fa-times"></i></button>
                <h2 class="text-2xl font-bold mb-6 text-gray-800">创建账号</h2>
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">用户名</label>
                        <input type="text" id="regUser"
                            class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-400 focus:outline-none"
                            placeholder="输入用户名">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">密码</label>
                        <input type="password" id="regPwd"
                            class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-400 focus:outline-none"
                            placeholder="输入密码">
                    </div>
                    <button onclick="submitRegister()"
                        class="w-full bg-green-500 text-white font-bold py-2 rounded-lg hover:bg-green-600 transition mt-4">注册</button>
                </div>
            </div>
        </div>

        <!-- 确认删除模态框 -->
        <div id="deleteModal" class="modal">
            <div class="modal-content relative text-center">
                <div class="mx-auto flex items-center justify-center h-12 w-12 rounded-full bg-red-100 mb-4">
                    <i class="fas fa-exclamation-triangle text-red-600 text-xl"></i>
                </div>
                <h3 class="text-lg leading-6 font-medium text-gray-900 mb-2">删除文件</h3>
                <div class="mt-2 mb-6">
                    <p class="text-sm text-gray-500">文件会移入回收站，之后可以恢复或永久删除。</p>
                </div>
                <div class="flex justify-center space-x-4">
                    <button onclick="closeModal('deleteModal')"
                        class="px-4 py-2 bg-gray-100 text-gray-700 rounded-lg hover:bg-gray-200 transition">取消</button>
                    <button id="confirmDeleteBtn"
                        class="px-4 py-2 bg-red-600 text-white rounded-lg hover:bg-red-700 transition">确认删除</button>
                </div>
            </div>
        </div>

        <!-- 提示消息 -->
        <div id="toast"
            class="fixed bottom-4 right-4 bg-gray-800 text-white px-6 py-3 rounded-lg shadow-lg transform transition-transform translate-y-20 opacity-0 z-50">
            <span id="toastMsg">提示内容</span>
        </div>
        <div id="actionMenu" class="action-menu"></div>

        <div class="flex">
            <aside class="sidebar min-h-[calc(100vh-76px)] p-6 flex flex-col">
                <nav class="space-y-2">
                    <button onclick="setTrashView(false)" class="nav-item active w-full"><i class="far fa-folder w-5"></i><span>我的文件</span></button>
                    <button onclick="setTrashView(true)" class="nav-item w-full"><i class="far fa-trash-can w-5"></i><span>回收站</span></button>
                </nav>
            </aside>

            <main class="flex-1 p-5 md:p-6 min-w-0">
                <div class="grid grid-cols-1 2xl:grid-cols-[minmax(0,1fr)_500px] gap-5">
                    <section class="min-w-0 space-y-5">
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                            <div class="glass-card p-6 flex items-center gap-5">
                                <div class="metric-icon bg-blue-50 text-blue-600"><i class="far fa-file text-2xl"></i></div>
                                <div>
                                    <h2 class="text-base font-black">文件总数</h2>
                                    <div id="statFiles" class="mt-4 text-2xl font-black text-gray-950">0</div>
                                    <div class="text-sm text-slate-500 mt-1">个文件</div>
                                </div>
                            </div>
                            <div class="glass-card p-6 flex items-center gap-5">
                                <div class="metric-icon bg-emerald-50 text-emerald-600"><i class="fas fa-layer-group text-2xl"></i></div>
                                <div>
                                    <h2 class="text-base font-black">已索引文档</h2>
                                    <div id="statSummaries" class="mt-4 text-2xl font-black text-gray-950">0</div>
                                    <div class="text-sm text-slate-500 mt-1">可用于 AI 问答</div>
                                </div>
                            </div>
                            <div class="glass-card p-6 flex items-center gap-5">
                                <div class="metric-icon bg-violet-50 text-violet-600"><i class="far fa-clock text-2xl"></i></div>
                                <div>
                                    <h2 class="text-base font-black">摘要任务</h2>
                                    <div id="statTasks" class="mt-4 text-2xl font-black text-gray-950">0</div>
                                    <div class="text-sm text-slate-500 mt-1">正在处理</div>
                                </div>
                            </div>
                        </div>

                        <label class="upload-zone rounded-lg flex items-center justify-center cursor-pointer px-6">
                            <input type="file" class="hidden" onchange="uploadFile(this)">
                            <div class="flex items-center gap-4 text-center sm:text-left">
                                <i class="fas fa-cloud-arrow-up text-4xl text-blue-600"></i>
                                <div>
                                    <div class="text-base font-bold">拖拽文件到此处，或 <span class="text-blue-600">点击上传</span></div>
                                    <div class="text-sm text-slate-500 mt-2">支持单个或批量上传，最大 5 GB/个</div>
                                </div>
                            </div>
                        </label>

                        <div class="glass-card overflow-hidden">
                            <div class="p-4 border-b border-slate-100 flex flex-col lg:flex-row lg:justify-between lg:items-center gap-3 bg-white">
                                <div>
                                    <h3 class="text-lg font-black text-gray-950">最近文件</h3>
                                    <div id="breadcrumb" class="mt-2 text-sm text-slate-500"></div>
                                </div>
                                <div class="compact-toolbar">
                                    <div class="segmented">
                                        <button id="filesViewBtn" onclick="setTrashView(false)" class="active">全部文件</button>
                                        <button id="trashViewBtn" onclick="setTrashView(true)">回收站</button>
                                    </div>
                                    <button onclick="summarizeMissing()" class="ghost-btn h-10 px-3 text-sm font-bold" title="补全摘要">
                                        <i class="fas fa-list-check mr-2"></i>补全摘要
                                    </button>
                                </div>
                            </div>

                            <div
                                class="hidden md:grid grid-cols-12 gap-4 px-5 py-3 bg-slate-50 text-xs font-bold text-slate-500 border-b border-slate-100 select-none">
                                <div class="col-span-4 flex items-center cursor-pointer hover:text-blue-600 transition"
                                    onclick="toggleSort('name')">
                                    名称 <i id="sortIcon_name" class="fas fa-sort ml-2 text-gray-300"></i>
                                </div>
                                <div class="col-span-2">类型</div>
                                <div class="col-span-2 flex items-center cursor-pointer hover:text-blue-600 transition"
                                    onclick="toggleSort('size')">
                                    大小 <i id="sortIcon_size" class="fas fa-sort ml-2 text-gray-300"></i>
                                </div>
                                <div class="col-span-3 flex items-center cursor-pointer hover:text-blue-600 transition"
                                    onclick="toggleSort('time')">
                                    修改时间 <i id="sortIcon_time" class="fas fa-sort ml-2 text-gray-300"></i>
                                </div>
                                <div class="col-span-1 text-right">操作</div>
                            </div>

                            <div id="file-list" class="divide-y divide-slate-100 max-h-[46vh] overflow-y-auto">
                                <div class="p-8 text-center text-gray-400">正在连接服务器...</div>
                            </div>
                        </div>
                    </section>

                    <aside class="space-y-5">
                        <div class="glass-card chat-panel p-4 flex flex-col">
                            <div class="flex items-center justify-between pb-3">
                                <h2 class="text-lg font-black text-gray-950"><i class="fas fa-wand-magic-sparkles text-blue-600 mr-2"></i>AI 智能助理</h2>
                                <div class="flex items-center gap-1">
                                    <button onclick="clearChatHistory()" class="icon-btn" title="清空对话"><i class="fas fa-rotate-left"></i></button>
                                </div>
                            </div>
                            <div id="chatHistory"
                                class="flex-1 min-h-[360px] max-h-[58vh] overflow-y-auto text-sm text-gray-700 bg-gradient-to-b from-slate-50 to-white p-4 rounded-lg border border-slate-100">
                                <div class="flex items-start mb-4">
                                    <div class="w-9 h-9 rounded-full bg-blue-50 text-blue-600 flex items-center justify-center mr-3 shrink-0">
                                        <i class="fas fa-robot"></i>
                                    </div>
                                    <span class="bg-white px-4 py-3 rounded-lg rounded-tl-none inline-block border border-slate-100 shadow-sm leading-6">我可以帮你搜索文件摘要，也能回答网盘里的资料问题。</span>
                                </div>
                            </div>
                            <div class="mt-4 border border-slate-200 rounded-lg bg-white p-3">
                                <div class="relative flex">
                                    <input type="text" id="chatInput" placeholder="输入问题，Enter 发送" onkeypress="handleChatKeyPress(event)"
                                        class="w-full pl-2 pr-12 py-2 rounded-lg bg-white focus:outline-none text-sm">
                                    <button id="chatSendBtn" onclick="sendChatMessage()"
                                        class="absolute right-0 top-0 w-10 h-10 rounded-lg bg-blue-600 text-white hover:bg-blue-700">
                                        <i class="fas fa-paper-plane"></i>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </aside>
                </div>
            </main>
        </div>
    </div>

    <script>
        // --- 模态框逻辑 ---
        function openModal(id) {
            document.getElementById(id).classList.add('active');
        }
        function closeModal(id) {
            document.getElementById(id).classList.remove('active');
            // 清空输入框
            const inputs = document.getElementById(id).querySelectorAll('input');
            inputs.forEach(input => input.value = '');
        }

        const APP_PROTOCOL = window.location.protocol === 'https:' ? 'https:' : 'http:';
        const APP_HOST = window.location.hostname || 'localhost';
        const API_BASE = `${APP_PROTOCOL}//${APP_HOST}:8080`;
        const AGENT_BASE = `${APP_PROTOCOL}//${APP_HOST}:8081`;

        function showToast(msg, isError = false) {
            const toast = document.getElementById('toast');
            document.getElementById('toastMsg').innerText = msg;
            toast.style.backgroundColor = isError ? '#ef4444' : '#374151';
            toast.classList.remove('translate-y-20', 'opacity-0');
            setTimeout(() => {
                toast.classList.add('translate-y-20', 'opacity-0');
            }, 3000);
        }

        // --- 核心逻辑：UI 更新 ---
        let globalFiles = [];
        let globalFolders = [];
        let currentDir = "/";
        let showingTrash = false;
        let summaryTasksByHash = {};
        let summaryPollTimer = null;

        function checkAuth() {
            const user = localStorage.getItem('username');
            const token = getAuthToken();
            const userInfoDiv = document.getElementById('user-info');
            updateChatAuthState(Boolean(user && token));

            if (user && token) {
                userInfoDiv.innerHTML = `
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 bg-gradient-to-br from-slate-800 to-slate-500 rounded-full flex items-center justify-center text-white font-bold shadow-sm">
                            ${user[0].toUpperCase()}
                        </div>
                        <span class="hidden md:inline text-gray-800 font-bold">${user}</span>
                        <button onclick="logout()" class="icon-btn" title="注销"><i class="fas fa-chevron-down"></i></button>
                    </div>
                `;
                fetchFileList(); // 登录状态下加载文件
            } else {
                userInfoDiv.innerHTML = `
                    <button onclick="openModal('loginModal')" class="ghost-btn h-10 px-4 text-sm font-bold">登录</button>
                    <button onclick="openModal('registerModal')" class="primary-btn h-10 px-4 text-sm font-bold">注册</button>
                `;
                document.getElementById('file-list').innerHTML = '<div class="p-8 text-center text-gray-400">请先登录以查看文件</div>';
            }
        }

        function logout() {
            localStorage.removeItem('username');
            localStorage.removeItem('token');
            localStorage.removeItem('smartnas_token');
            location.reload(); // 刷新页面恢复初始状态
        }

        function getAuthToken() {
            const token = localStorage.getItem('token') || localStorage.getItem('smartnas_token');
            if (token && !localStorage.getItem('token')) {
                localStorage.setItem('token', token);
            }
            return token;
        }

        function updateChatAuthState(isAuthed) {
            const input = document.getElementById('chatInput');

        // --- 核心逻辑：获取文件列表 ---
        async function fetchFileList() {
            const token = getAuthToken(); // 拿 JWT token
            if (!token) return;

            try {
                const response = await fetch(listUrl(), {
                    method: 'GET',
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (!response.ok) throw new Error("服务器拒绝访问");

                const payload = await response.json();
                globalFiles = Array.isArray(payload) ? payload : (payload.files || []);
                globalFolders = Array.isArray(payload) ? [] : (payload.folders || []);
                updateStats();
                renderBreadcrumb();
                applyFilterAndSort();
            } catch (e) {
                console.error("获取失败:", e);
                document.getElementById('file-list').innerHTML = '<div class="p-8 text-center text-red-400">列表加载失败，请检查登录状态</div>';
            }
        }

        let currentSortField = 'time'; // 默认按时间
        let currentSortDesc = true;    // 默认降序

        function toggleSort(field) {
            if (currentSortField === field) {
                currentSortDesc = !currentSortDesc; // 切换升降序
            } else {
                currentSortField = field;
                currentSortDesc = false; // 新字段默认升序
            }
            updateSortIcons();
            applyFilterAndSort();
        }

        function updateSortIcons() {
            // 重置所有图标
            const nameIcon = document.getElementById('sortIcon_name');
            const sizeIcon = document.getElementById('sortIcon_size');
            const timeIcon = document.getElementById('sortIcon_time');
            if (nameIcon) nameIcon.className = "fas fa-sort ml-2 text-gray-300";
            if (sizeIcon) sizeIcon.className = "fas fa-sort ml-2 text-gray-300";
            if (timeIcon) timeIcon.className = "fas fa-sort ml-2 text-gray-300";

            const activeIcon = document.getElementById(`sortIcon_${currentSortField}`);
            if (activeIcon) {
                activeIcon.className = currentSortDesc ? "fas fa-sort-down ml-2 text-blue-600" : "fas fa-sort-up ml-2 text-blue-600";
            }
        }

        function applyFilterAndSort() {
            const query = (document.getElementById('searchInput').value || '').toLowerCase().trim();

            let filtered = globalFiles.filter(f => {
                const summary = (f.summary || '').toLowerCase();
                return f.name.toLowerCase().includes(query) || summary.includes(query);
            });

            filtered.sort((a, b) => {
                let cmp = 0;
                if (currentSortField === 'name') {
                    cmp = a.name.localeCompare(b.name);
                } else if (currentSortField === 'size') {
                    cmp = a.rawSize - b.rawSize;
                } else {
                    cmp = a.uploadTime - b.uploadTime;
                }
                return currentSortDesc ? -cmp : cmp;
            });

            renderFiles(filtered);
        }

        function updateStats() {
            const activeTasks = Object.values(summaryTasksByHash).filter(t => ['pending', 'running'].includes(t.status)).length;
            const summarized = globalFiles.filter(f => (f.summary || '').trim()).length;
            const statFiles = document.getElementById('statFiles');
            const statSummaries = document.getElementById('statSummaries');
            const statTasks = document.getElementById('statTasks');
            if (statFiles) statFiles.innerText = globalFiles.length;
            if (statSummaries) statSummaries.innerText = summarized;
            if (statTasks) statTasks.innerText = activeTasks;
        }

        // 格式化时间戳显示
        function formatUploadTime(timestamp) {
            if (!timestamp) return '-';
            // C++ time_since_epoch().count() 可能是纳秒或微秒级别
            let ms = timestamp;
            if (timestamp > 1e15) ms = Math.floor(timestamp / 1000000); // ns to ms
            else if (timestamp > 1e12 && timestamp < 1e15) ms = Math.floor(timestamp / 1000); // us to ms
            else if (timestamp < 1e11) ms = timestamp * 1000; // s to ms

            const d = new Date(ms);
            return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')} ${String(d.getHours()).padStart(2, '0')}:${String(d.getMinutes()).padStart(2, '0')}`;
        }

        function escapeHtml(value) {
            return String(value || '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function getFileIcon(name) {
            const ext = (name.split('.').pop() || '').toLowerCase();
            if (['pdf'].includes(ext)) return 'fa-file-pdf text-red-500';
            if (['docx', 'doc'].includes(ext)) return 'fa-file-word text-blue-600';
            if (['xlsx', 'xls', 'csv'].includes(ext)) return 'fa-file-excel text-emerald-600';
            if (['pptx', 'ppt'].includes(ext)) return 'fa-file-powerpoint text-orange-500';
            if (['html', 'htm', 'json', 'txt', 'md', 'xml', 'svg', 'ipynb'].includes(ext)) return 'fa-file-lines text-slate-500';
            if (['png', 'jpg', 'jpeg', 'webp', 'gif', 'bmp', 'tiff', 'tif'].includes(ext)) return 'fa-file-image text-cyan-600';
            if (['mp4'].includes(ext)) return 'fa-file-video text-violet-600';
            if (['mp3', 'wav', 'm4a'].includes(ext)) return 'fa-file-audio text-fuchsia-600';
            if (['zip', 'epub'].includes(ext)) return 'fa-file-zipper text-amber-600';
            return 'fa-file text-slate-500';
        }

        function getFileTypeLabel(name) {
            const ext = (name.split('.').pop() || '').toLowerCase();
            if (!ext || ext === name.toLowerCase()) return '文件';
            const labels = {
                pdf: 'PDF',
                doc: 'DOC',
                docx: 'DOCX',
                xls: 'XLS',
                xlsx: 'XLSX',
                csv: 'CSV',
                ppt: 'PPT',
                pptx: 'PPTX',
                md: 'Markdown',
                txt: 'TXT',
                png: 'PNG',
                jpg: 'JPG',
                jpeg: 'JPEG',
                webp: 'WEBP',
                json: 'JSON',
                mp4: 'MP4',
                mp3: 'MP3',
                zip: 'ZIP'
            };
            return labels[ext] || ext.toUpperCase();
        }

        function isSummarizableFile(name) {
            const ext = (name.split('.').pop() || '').toLowerCase();
            return [
                'pdf', 'docx', 'pptx', 'xlsx', 'txt', 'csv', 'json', 'html', 'htm',
                'md', 'xml', 'epub', 'zip', 'ipynb',
                'jpg', 'jpeg', 'png', 'webp', 'gif', 'bmp', 'tiff', 'tif', 'svg',
                'wav', 'mp3', 'm4a', 'mp4'
            ].includes(ext);
        }

        function getSummaryBadge(file) {
            const task = summaryTasksByHash[file.hash];
            if (task && ['pending', 'running'].includes(task.status)) {
                return '<span class="summary-pill summary-running"><i class="fas fa-spinner fa-spin"></i>摘要中</span>';
            }
            if (task && task.status === 'failed') {
                return '<span class="summary-pill summary-failed"><i class="fas fa-circle-exclamation"></i>失败</span>';
            }
            if ((file.summary || '').trim()) {

            }
            return '<span class="summary-pill summary-empty"><i class="fas fa-minus"></i>未摘要</span>';
        }

        async function uploadFile(input) {
            const token = getAuthToken();
            if (!token) { showToast("请先登录", true); return; }

            const file = input.files[0];
            if (!file) return;

            const originalName = encodeURIComponent(file.name);
            const CHUNK_SIZE = 2 * 1024 * 1024; // 2MB
            const totalChunks = Math.ceil(file.size / CHUNK_SIZE);

            showToast("正在计算文件校验和...", false);

            // 计算文件的 MD5 hash（这里为了简单使用 MD5 模拟后端所需的 hash）
            // 注意：真实环境中推荐和后端 hash 算法一致，但此处我们用 MD5 作为文件唯一标识
            const fileHash = await calculateFileHash(file);

            showToast("正在校验文件状态...", false);

            try {
                // 1. 初始化上传：检查是否秒传，或需要哪些分片
                const initRes = await fetch(`${API_BASE}/api/upload/init?hash=${fileHash}&total=${totalChunks}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const initData = await initRes.json();

                if (initData.status === "exists") { // 秒传逻辑由合并接口处理或在此截断
                    // 秒传可以直接调用 merge 让后端处理元数据
                    await fetch(`${API_BASE}/api/upload/merge`, {
                        method: 'POST',
                        headers: {
                            'Authorization': `Bearer ${token}`, 'File-Name': originalName,
                            'File-Hash': fileHash, 'Total-Chunks': totalChunks, 'File-Size': file.size,
                            'Directory': encodeURIComponent(currentDir)
                        }
                    });
                    showToast("上传结果: Hit! Seconds-Transfer success.");
                    fetchFileList();
                    if (isSummarizableFile(file.name)) startSummarizeByHash(fileHash, { silent: true });
                    input.value = '';
                    return;
                }

                // 2. 上传缺失的分片
                const missingChunks = initData.missing || [];
                for (let i = 0; i < missingChunks.length; i++) {
                    const chunkIndex = missingChunks[i];
                    const start = chunkIndex * CHUNK_SIZE;
                    const end = Math.min(start + CHUNK_SIZE, file.size);
                    const chunk = file.slice(start, end);

                    showToast(`正在上传分片 ${i + 1}/${missingChunks.length}...`);

                    await fetch(`${API_BASE}/api/upload/chunk`, {
                        method: 'POST',
                        headers: {
                            'File-Hash': fileHash,
                            'Chunk-Index': chunkIndex,
                            'Authorization': `Bearer ${token}`
                        },
                        body: chunk
                    });
                }

                showToast("合并文件...");

                // 3. 通知后端合并分片
                const mergeRes = await fetch(`${API_BASE}/api/upload/merge`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}`, 'File-Name': originalName,
                        'File-Hash': fileHash, 'Total-Chunks': totalChunks, 'File-Size': file.size,
                        'Directory': encodeURIComponent(currentDir)
                    }
                });
                const mergeData = await mergeRes.json();
                showToast("上传结果: " + mergeData.message);
                fetchFileList();
                if (isSummarizableFile(file.name)) startSummarizeByHash(fileHash, { silent: true });
            } catch (e) {
                console.error(e);
                showToast("上传过程出错", true);
            } finally {
                input.value = '';
            }
        }

        async function calculateFileHash(file) {
            const buffer = await file.arrayBuffer();
            const digest = await crypto.subtle.digest('SHA-256', buffer);
            return Array.from(new Uint8Array(digest)).map(b => b.toString(16).padStart(2, '0')).join('');
        }

        function downloadByHash(hash) {
            const token = getAuthToken();
            if (!token) { showToast("请先登录", true); return; }
            window.open(`${API_BASE}/download?hash=${hash}&token=${token}`);
        }

        function previewByHash(hash) {
            const token = getAuthToken();
            if (!token) { showToast("请先登录", true); return; }
            window.open(`${API_BASE}/api/preview?hash=${hash}&token=${token}`, "_blank");
        }

        async function summarizeByHash(hash) {
            await startSummarizeByHash(hash, { force: true });
        }

        async function startSummarizeByHash(hash, options = {}) {
            const token = getAuthToken();
            const force = Boolean(options.force);
            const silent = Boolean(options.silent);
            if (!token) { if (!silent) showToast("请先登录", true); return; }

            if (!silent) showToast("摘要任务已加入队列");
            try {
                const response = await fetch(`${AGENT_BASE}/api/agent/summarize/start`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ hash, force })
                });
                const data = await response.json();
                if (!response.ok) {
                    throw new Error(data.detail || data.message || `AI 服务返回 ${response.status}`);
                }

                summaryTasksByHash[hash] = data;
                updateStats();
                applyFilterAndSort();
                ensureSummaryPolling();
            } catch (e) {
                console.error("摘要生成失败:", e);
                if (!silent) showToast(`摘要生成失败: ${e.message}`, true);
            }
        }

        async function summarizeMissing() {
            const token = getAuthToken();
            if (!token) { showToast("请先登录", true); return; }

            showToast("正在排队未摘要文件...");
            try {
                const response = await fetch(`${AGENT_BASE}/api/agent/summarize/missing`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await response.json();
                if (!response.ok) {
                    throw new Error(data.detail || data.message || `AI 服务返回 ${response.status}`);
                }
                (data.tasks || []).forEach(task => {
                    summaryTasksByHash[task.hash] = task;
                });
                showToast(`已排队 ${data.queued} 个摘要任务`);
                updateStats();
                applyFilterAndSort();
                ensureSummaryPolling();
            } catch (e) {
                console.error("批量摘要失败:", e);
                showToast(`批量摘要失败: ${e.message}`, true);
            }
        }

        function ensureSummaryPolling() {
            if (summaryPollTimer) return;
            summaryPollTimer = setInterval(pollSummaryTasks, 1800);
            pollSummaryTasks();
        }

        async function pollSummaryTasks() {
            const token = getAuthToken();
            if (!token) return;

            const activeTasks = Object.values(summaryTasksByHash).filter(t => ['pending', 'running'].includes(t.status));
            if (activeTasks.length === 0) {
                clearInterval(summaryPollTimer);
                summaryPollTimer = null;
                updateStats();
                return;
            }

            let shouldRefresh = false;
            await Promise.all(activeTasks.map(async task => {
                try {
                    const response = await fetch(`${AGENT_BASE}/api/agent/summarize/status/${task.id}`, {
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                    const data = await response.json();
                    if (response.ok) {
                        summaryTasksByHash[data.hash] = data;
                        if (['success', 'failed'].includes(data.status)) {
                            shouldRefresh = true;
                            if (data.status === 'success') showToast("摘要已生成");
                            if (data.status === 'failed') showToast(`摘要失败: ${data.message}`, true);
                        }
                    }
                } catch (e) {
                    console.error("摘要状态轮询失败:", e);
                }
            }));

            if (shouldRefresh) fetchFileList();
            updateStats();
            applyFilterAndSort();
        }

        let fileToDelete = null;
        function confirmDelete(hash) {
            fileToDelete = hash;
            openModal('deleteModal');
            document.getElementById('confirmDeleteBtn').onclick = async () => {
                await deleteByHash(fileToDelete);
            };
        }

        async function deleteByHash(hash) {
            const token = getAuthToken();
            if (!token) {
                showToast("请先登录", true);
                closeModal('deleteModal');
                return;
            }

            try {
                const response = await fetch(`${API_BASE}/api/delete?hash=${hash}`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (response.ok) {
                    showToast("删除成功");
                    fetchFileList(); // 刷新列表
                } else {
                    showToast("删除失败或没有权限", true);
                }
            } catch (e) {
                console.error("删除出错:", e);
                showToast("删除异常", true);
            } finally {
                closeModal('deleteModal');
                fileToDelete = null;
            }
        }

        async function restoreByHash(hash) {
            const token = getAuthToken();
            if (!token) return;
            const res = await fetch(`${API_BASE}/api/restore?hash=${encodeURIComponent(hash)}`, {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${token}` }
            });
            showToast(res.ok ? "已恢复" : "恢复失败", !res.ok);
            fetchFileList();
        }

        async function purgeByHash(hash) {
            const token = getAuthToken();
            if (!token) return;
            if (!confirm("永久删除后无法恢复，确认继续？")) return;
            const res = await fetch(`${API_BASE}/api/purge?hash=${encodeURIComponent(hash)}`, {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${token}` }
            });
            showToast(res.ok ? "已永久删除" : "永久删除失败", !res.ok);
            fetchFileList();
        }

        async function renameByHash(hash, oldName) {
            const token = getAuthToken();
            if (!token) return;
            const decodedOldName = decodeURIComponent(oldName || '').replace(/&quot;/g, '"').replace(/&#39;/g, "'");
            const name = prompt("输入新的文件名", decodedOldName);
            if (!name) return;
            const res = await fetch(`${API_BASE}/api/rename?hash=${encodeURIComponent(hash)}&name=${encodeURIComponent(name)}`, {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${token}` }
            });
            showToast(res.ok ? "重命名成功" : "重命名失败", !res.ok);
            fetchFileList();
        }

        async function moveByHash(hash) {
            const token = getAuthToken();
            if (!token) return;
            const dir = prompt("移动到目录，例如 /合同/2026", currentDir);
            if (!dir) return;
            const res = await fetch(`${API_BASE}/api/move?hash=${encodeURIComponent(hash)}&dir=${encodeURIComponent(dir)}`, {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${token}` }
            });
            showToast(res.ok ? "移动成功" : "移动失败", !res.ok);
            fetchFileList();
        }

        async function shareByHash(hash) {
            const token = getAuthToken();
            if (!token) return;
            const res = await fetch(`${API_BASE}/api/share/create?hash=${encodeURIComponent(hash)}&hours=24`, {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const data = await res.json();
            if (!res.ok) {
                showToast("分享失败", true);
                return;
            }
            const url = `${window.location.origin}${data.url}`;
            try {
                await navigator.clipboard.writeText(url);
                showToast("分享链接已复制，有效期 24 小时");
            } catch {
                showToast(url);
            }
        }

        async function createFolder() {
            const token = getAuthToken();
            if (!token) return;
            const name = prompt("文件夹名称");
            if (!name) return;
            const path = currentDir === "/" ? `/${name}` : `${currentDir}/${name}`;
            const res = await fetch(`${API_BASE}/api/folders?path=${encodeURIComponent(path)}`, {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${token}` }
            });
            showToast(res.ok ? "文件夹已创建" : "创建文件夹失败", !res.ok);
            fetchFileList();
        }

        async function showMarkdownByHash(hash) {
            const token = getAuthToken();
            if (!token) return;
            showToast("正在读取提取文本...");
            try {
                const res = await fetch(`${AGENT_BASE}/api/agent/markdown/${encodeURIComponent(hash)}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.detail || '读取失败');
                const win = window.open('', '_blank');
                win.document.write(`<pre style="white-space:pre-wrap;font:14px/1.6 ui-monospace,monospace;padding:24px;color:#1f2937">${escapeHtml(data.markdown)}</pre>`);
            } catch (e) {
                showToast(`读取提取文本失败: ${e.message}`, true);
            }
        }

        async function askFileByHash(hash) {
            const token = getAuthToken();
            if (!token) return;
            const question = prompt("想问这个文件什么？");
            if (!question) return;
            showToast("正在基于文件内容回答...");
            try {
                const res = await fetch(`${AGENT_BASE}/api/agent/file_qa`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ hash, question })
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.detail || '问答失败');
                const history = document.getElementById('chatHistory');
                history.innerHTML += `<div class="flex items-start justify-end mb-2"><span class="bg-gray-100 px-3 py-2 rounded-lg rounded-tr-none inline-block text-right text-gray-800">${escapeHtml(question)}</span><i class="fas fa-user text-gray-400 mt-1 ml-2"></i></div>`;
                history.innerHTML += `<div class="flex items-start mb-2"><i class="fas fa-robot text-blue-500 mt-1 mr-2"></i><span class="bg-white px-3 py-2 rounded-lg rounded-tl-none inline-block border border-slate-100">${escapeHtml(data.answer).replace(/\n/g, '<br>')}</span></div>`;
                history.scrollTop = history.scrollHeight;
                showToast("文件问答完成");
            } catch (e) {
                showToast(`文件问答失败: ${e.message}`, true);
            }
        }

        // 页面加载时初始化 UI
        window.onload = () => {
            checkAuth();
            updateSortIcons();
        };
    </script>

<!-- Chat JS Logic -->
<script>
    async function sendChatMessage() {
        const input = document.getElementById('chatInput');
        const text = input.value.trim();
        if (!text) return;

        const history = document.getElementById('chatHistory');

        // 追加用户的消息
        const userMsg = document.createElement('div');
        userMsg.className = 'flex items-start justify-end mb-2';
        userMsg.innerHTML = `<span class="bg-gray-100 px-3 py-2 rounded-lg rounded-tr-none inline-block text-right text-gray-800">${text}</span><i class="fas fa-user text-gray-400 mt-1 ml-2"></i>`;
        history.appendChild(userMsg);

        input.value = '';
        history.scrollTop = history.scrollHeight;

        // 追加一个 "思考中..." 提示
        const thinkingMsg = document.createElement('div');
        thinkingMsg.className = 'flex items-start mb-2 text-gray-400 text-xs italic thinking-msg';
        thinkingMsg.innerHTML = '<i class="fas fa-robot mt-1 mr-2"></i>思考中...';
        history.appendChild(thinkingMsg);
        history.scrollTop = history.scrollHeight;

        try {
            const token = getAuthToken();
            if (!token) {
                updateChatAuthState(false);
                throw new Error("请先登录后再使用 AI 助手");
            }
            const res = await fetch(`${AGENT_BASE}/api/agent/chat`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify({ prompt: text })
            });
            const data = await res.json();
            if (!res.ok) {
                throw new Error(data.detail || data.message || `AI 服务返回 ${res.status}`);
            }

            // 移除思考中
            const thinkNodes = history.querySelectorAll('.thinking-msg');
            thinkNodes.forEach(node => node.remove());

            // 准备 AI 回答气泡
            const aiMsg = document.createElement('div');
            aiMsg.className = 'flex items-start mb-2';
            aiMsg.innerHTML = `<i class="fas fa-robot text-blue-500 mt-1 mr-2"></i><span class="bg-blue-50 px-3 py-2 rounded-lg rounded-tl-none inline-block ai-text"></span>`;
            history.appendChild(aiMsg);
            const aiTextSpan = aiMsg.querySelector('.ai-text');

            if (data.status === "success") {
                aiTextSpan.innerHTML += data.response.replace(/\n/g, "<br>");
            } else {
                aiTextSpan.innerHTML += "Error: " + data.message;
            }
            history.scrollTop = history.scrollHeight;

        } catch (error) {
            console.error('Chat Error:', error);
            const thinkNodes = history.querySelectorAll('.thinking-msg');
            thinkNodes.forEach(node => node.remove());
            const errorMsg = document.createElement('div');
            errorMsg.className = 'flex items-start mb-2';
            const detail = error instanceof TypeError
                ? `AI 服务未启动或不可达，请确认 Agent 正在运行：${AGENT_BASE}`
                : error.message;
            errorMsg.innerHTML = `<i class="fas fa-robot text-red-500 mt-1 mr-2"></i><span class="bg-red-50 text-red-600 px-3 py-2 rounded-lg rounded-tl-none inline-block">抱歉，无法连接到 AI 引擎: ${detail}</span>`;
            history.appendChild(errorMsg);
        }
    }

    function handleChatKeyPress(e) {
        if (e.key === 'Enter') sendChatMessage();
    }

    async function clearChatHistory() {
        const token = getAuthToken();
        if (!token) return;
        try {
            await fetch(`${AGENT_BASE}/api/agent/clear_history`, {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${token}` }
            });
            document.getElementById('chatHistory').innerHTML = `
                <div class="flex items-start mb-2">
                    <i class="fas fa-robot text-blue-500 mt-1 mr-2"></i>
                    <span class="bg-white px-3 py-2 rounded-lg rounded-tl-none inline-block border border-slate-100">对话已清空。</span>
                </div>
            `;
        } catch (e) {
            showToast("清空对话失败", true);
        }
    }
</script>
