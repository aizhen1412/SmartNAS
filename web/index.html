<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartNAS | 你的私有智能云</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/vendor/hash-wasm-sha256.umd.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="/assets/css/app.css" rel="stylesheet">
</head>

<body>
    <div class="min-h-screen">
        <!-- 顶部导航 -->
        <header class="topbar sticky top-0 z-40 flex items-center px-5 md:px-8">
            <div class="flex items-center gap-4 w-[240px] shrink-0">
                <div class="brand-mark" aria-hidden="true"><span></span><span></span><span></span></div>
                <h1 class="text-2xl font-black text-gray-950">SmartNAS</h1>
            </div>
            <div class="relative flex-1 max-w-xl ml-4 hidden md:block">
                <i class="fas fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-slate-500"></i>
                <input type="text" id="searchInput" oninput="applyFilterAndSort()" placeholder="搜索文件名、摘要或标签"
                    class="w-full h-11 pl-11 pr-4 rounded-lg bg-white border border-slate-200 shadow-sm focus:ring-2 focus:ring-blue-100 focus:border-blue-400 focus:outline-none text-sm">
            </div>
            <div class="ml-auto flex items-center gap-3">
                <label class="primary-btn cursor-pointer h-11 px-5 hidden sm:flex items-center gap-2 text-sm font-bold">
                    <i class="fas fa-arrow-up-from-bracket"></i>
                    <span>上传文件</span>
                    <input type="file" id="fileInput" class="hidden" onchange="uploadFile(this)">
                </label>
                <button onclick="createFolder()" class="ghost-btn h-11 px-4 hidden sm:flex items-center gap-2 text-sm font-bold" title="新建文件夹">
                    <i class="far fa-square-plus"></i>
                    <span>新建文件夹</span>
                </button>
                <div id="user-info" class="flex items-center gap-3"></div>
            </div>
        </header>

        <!-- 登录模态框 -->
        <div id="loginModal" class="modal">
            <div class="modal-content relative">
                <button onclick="closeModal('loginModal')"
                    class="absolute top-4 right-4 text-gray-400 hover:text-gray-600"><i
                        class="fas fa-times"></i></button>
                <h2 class="text-2xl font-bold mb-6 text-gray-800">欢迎回来</h2>
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">用户名</label>
                        <input type="text" id="loginUser"
                            class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-400 focus:outline-none"
                            placeholder="输入用户名">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">密码</label>
                        <input type="password" id="loginPwd"
                            class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-400 focus:outline-none"
                            placeholder="输入密码">
                    </div>
                    <button onclick="submitLogin()"
                        class="w-full bg-blue-600 text-white font-bold py-2 rounded-lg hover:bg-blue-700 transition mt-4">登录</button>
                </div>
            </div>
        </div>

        <!-- 注册模态框 -->
        <div id="registerModal" class="modal">
            <div class="modal-content relative">
                <button onclick="closeModal('registerModal')"
                    class="absolute top-4 right-4 text-gray-400 hover:text-gray-600"><i
                        class="fas fa-times"></i></button>
                <h2 class="text-2xl font-bold mb-6 text-gray-800">创建账号</h2>
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">用户名</label>
                        <input type="text" id="regUser"
                            class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-400 focus:outline-none"
                            placeholder="输入用户名">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">密码</label>
                        <input type="password" id="regPwd"
                            class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-400 focus:outline-none"
                            placeholder="输入密码">
                    </div>
                    <button onclick="submitRegister()"
                        class="w-full bg-green-500 text-white font-bold py-2 rounded-lg hover:bg-green-600 transition mt-4">注册</button>
                </div>
            </div>
        </div>

        <!-- 确认删除模态框 -->
        <div id="deleteModal" class="modal">
            <div class="modal-content relative text-center">
                <div class="mx-auto flex items-center justify-center h-12 w-12 rounded-full bg-red-100 mb-4">
                    <i class="fas fa-exclamation-triangle text-red-600 text-xl"></i>
                </div>
                <h3 id="deleteModalTitle" class="text-lg leading-6 font-medium text-gray-900 mb-2">删除文件</h3>
                <div class="mt-2 mb-6">
                    <p id="deleteModalDescription" class="text-sm text-gray-500">文件会移入回收站，之后可以恢复或永久删除。</p>
                </div>
                <div class="flex justify-center space-x-4">
                    <button onclick="closeModal('deleteModal')"
                        class="px-4 py-2 bg-gray-100 text-gray-700 rounded-lg hover:bg-gray-200 transition">取消</button>
                    <button id="confirmDeleteBtn"
                        class="px-4 py-2 bg-red-600 text-white rounded-lg hover:bg-red-700 transition">确认删除</button>
                </div>
            </div>
        </div>

        <!-- 文件问答模态框 -->
        <div id="askFileModal" class="modal">
            <div class="modal-content relative" style="max-width: 560px;">
                <button onclick="closeModal('askFileModal')"
                    class="absolute top-4 right-4 text-gray-400 hover:text-gray-600"><i class="fas fa-times"></i></button>
                <div class="flex items-center gap-3 mb-5">
                    <div class="w-11 h-11 rounded-lg bg-blue-50 text-blue-600 flex items-center justify-center">
                        <i class="fas fa-circle-question text-lg"></i>
                    </div>
                    <div>
                        <h3 class="text-lg font-black text-gray-950">问这个文件</h3>
                        <p class="text-sm text-slate-500">回答只基于当前文件中可提取的内容</p>
                    </div>
                </div>
                <label for="askFileQuestion" class="block text-sm font-bold text-slate-700 mb-2">你的问题</label>
                <textarea id="askFileQuestion" rows="4" placeholder="例如：这份文件的主要结论是什么？"
                    class="w-full px-4 py-3 border border-slate-200 rounded-lg bg-slate-50 focus:bg-white focus:ring-2 focus:ring-blue-100 focus:border-blue-400 focus:outline-none text-sm resize-none"></textarea>
                <div id="askFileResult" class="hidden mt-4 p-4 rounded-lg border border-blue-100 bg-blue-50/70 text-sm text-slate-700 whitespace-pre-wrap max-h-64 overflow-y-auto"></div>
                <div class="flex justify-end gap-3 mt-5">
                    <button onclick="closeModal('askFileModal')" class="ghost-btn px-4 py-2 text-sm font-bold">取消</button>
                    <button id="askFileSubmitBtn" onclick="submitAskFile()" class="primary-btn px-5 py-2 text-sm font-bold">
                        <i class="fas fa-paper-plane mr-2"></i>提交问题
                    </button>
                </div>
            </div>
        </div>

        <!-- 移动文件模态框 -->
        <div id="moveFileModal" class="modal">
            <div class="modal-content relative" style="max-width: 520px;">
                <button onclick="closeModal('moveFileModal')"
                    class="absolute top-4 right-4 text-gray-400 hover:text-gray-600"><i class="fas fa-times"></i></button>
                <div class="flex items-center gap-3 mb-5">
                    <div class="w-11 h-11 rounded-lg bg-amber-50 text-amber-600 flex items-center justify-center">
                        <i class="fas fa-folder-tree text-lg"></i>
                    </div>
                    <div>
                        <h3 class="text-lg font-black text-gray-950">移动文件</h3>
                        <p class="text-sm text-slate-500">选择参考路径，或输入新的完整目录</p>
                    </div>
                </div>
                <label for="moveFilePath" class="block text-sm font-bold text-slate-700 mb-2">目标路径</label>
                <input id="moveFilePath" type="text" placeholder="例如 /合同/2026"
                    class="w-full px-4 py-3 border border-slate-200 rounded-lg bg-slate-50 focus:bg-white focus:ring-2 focus:ring-blue-100 focus:border-blue-400 focus:outline-none text-sm">
                <div class="mt-4">
                    <div class="text-xs font-bold text-slate-500 mb-2">参考路径</div>
                    <div id="movePathSuggestions" class="flex flex-wrap gap-2 max-h-36 overflow-y-auto"></div>
                </div>
                <div class="flex justify-end gap-3 mt-5">
                    <button onclick="closeModal('moveFileModal')" class="ghost-btn px-4 py-2 text-sm font-bold">取消</button>
                    <button id="moveFileSubmitBtn" onclick="submitMoveFile()" class="primary-btn px-5 py-2 text-sm font-bold">确认移动</button>
                </div>
            </div>
        </div>

        <!-- 统一重命名模态框 -->
        <div id="renameModal" class="modal">
            <div class="modal-content relative" style="max-width: 500px;">
                <button onclick="closeModal('renameModal')"
                    class="absolute top-4 right-4 text-gray-400 hover:text-gray-600"><i class="fas fa-times"></i></button>
                <div class="flex items-center gap-3 mb-5">
                    <div class="w-11 h-11 rounded-lg bg-violet-50 text-violet-600 flex items-center justify-center">
                        <i class="fas fa-pen text-lg"></i>
                    </div>
                    <div>
                        <h3 id="renameModalTitle" class="text-lg font-black text-gray-950">重命名</h3>
                        <p class="text-sm text-slate-500">输入新的名称，路径会自动保持不变</p>
                    </div>
                </div>
                <label for="renameInput" class="block text-sm font-bold text-slate-700 mb-2">新名称</label>
                <input id="renameInput" type="text"
                    class="w-full px-4 py-3 border border-slate-200 rounded-lg bg-slate-50 focus:bg-white focus:ring-2 focus:ring-blue-100 focus:border-blue-400 focus:outline-none text-sm">
                <div class="flex justify-end gap-3 mt-5">
                    <button onclick="closeModal('renameModal')" class="ghost-btn px-4 py-2 text-sm font-bold">取消</button>
                    <button id="renameSubmitBtn" onclick="submitRename()" class="primary-btn px-5 py-2 text-sm font-bold">确认重命名</button>
                </div>
            </div>
        </div>

        <!-- 提示消息 -->
        <div id="toast"
            class="fixed bottom-4 right-4 bg-gray-800 text-white px-6 py-3 rounded-lg shadow-lg transform transition-transform translate-y-20 opacity-0 z-50">
            <span id="toastMsg">提示内容</span>
        </div>
        <div id="actionMenu" class="action-menu"></div>

        <div class="flex">
            <aside class="sidebar min-h-[calc(100vh-76px)] p-6 flex flex-col">
                <nav class="space-y-2">
                    <button onclick="setTrashView(false)" class="nav-item active w-full"><i class="far fa-folder w-5"></i><span>我的文件</span></button>
                </nav>
                <div class="sidebar-stats mt-auto space-y-2">
                    <div class="sidebar-stat">
                        <span class="sidebar-stat-icon bg-blue-50 text-blue-600"><i class="far fa-file"></i></span>
                        <span class="text-xs font-semibold text-slate-500">文件总数</span>
                        <strong id="statFiles" class="text-sm text-gray-950">0</strong>
                    </div>
                    <div class="sidebar-stat">
                        <span class="sidebar-stat-icon bg-emerald-50 text-emerald-600"><i class="fas fa-layer-group"></i></span>
                        <span class="text-xs font-semibold text-slate-500">已索引</span>
                        <strong id="statSummaries" class="text-sm text-gray-950">0</strong>
                    </div>
                    <div class="sidebar-stat">
                        <span class="sidebar-stat-icon bg-violet-50 text-violet-600"><i class="far fa-clock"></i></span>
                        <span class="text-xs font-semibold text-slate-500">处理中</span>
                        <strong id="statTasks" class="text-sm text-gray-950">0</strong>
                    </div>
                </div>
            </aside>

            <main class="flex-1 p-5 md:p-6 min-w-0">
                <div class="grid grid-cols-1 xl:grid-cols-[minmax(0,1fr)_400px] gap-5 items-start">
                    <section class="min-w-0">
                        <div class="glass-card overflow-hidden">
                            <div class="p-4 border-b border-slate-100 flex flex-col lg:flex-row lg:justify-between lg:items-center gap-3 bg-white">
                                <div>
                                    <h3 class="text-base font-black text-gray-950"><i class="far fa-folder-open text-blue-600 mr-2"></i>当前目录</h3>
                                    <div id="breadcrumb" class="mt-2 text-sm text-slate-500"></div>
                                </div>
                                <div class="compact-toolbar">
                                    <div class="segmented">
                                        <button id="filesViewBtn" onclick="setTrashView(false)" class="active">全部文件</button>
                                        <button id="trashViewBtn" onclick="setTrashView(true)">回收站</button>
                                    </div>
                                </div>
                            </div>

                            <div
                                class="hidden md:grid grid-cols-12 gap-4 px-5 py-3 bg-slate-50 text-xs font-bold text-slate-500 border-b border-slate-100 select-none">
                                <div class="col-span-4 flex items-center cursor-pointer hover:text-blue-600 transition"
                                    onclick="toggleSort('name')">
                                    名称 <i id="sortIcon_name" class="fas fa-sort ml-2 text-gray-300"></i>
                                </div>
                                <div class="col-span-2">类型</div>
                                <div class="col-span-2 flex items-center cursor-pointer hover:text-blue-600 transition"
                                    onclick="toggleSort('size')">
                                    大小 <i id="sortIcon_size" class="fas fa-sort ml-2 text-gray-300"></i>
                                </div>
                                <div class="col-span-3 flex items-center cursor-pointer hover:text-blue-600 transition"
                                    onclick="toggleSort('time')">
                                    修改时间 <i id="sortIcon_time" class="fas fa-sort ml-2 text-gray-300"></i>
                                </div>
                                <div class="col-span-1 text-right">操作</div>
                            </div>

                            <div id="file-list" class="divide-y divide-slate-100 max-h-[calc(100vh-220px)] overflow-y-auto">
                                <div class="p-8 text-center text-gray-400">正在连接服务器...</div>
                            </div>
                        </div>
                    </section>

                    <aside class="xl:sticky xl:top-[96px] self-start">
                        <div class="glass-card chat-panel p-4 flex flex-col">
                            <div class="flex items-center justify-between pb-3">
                                <h2 class="text-lg font-black text-gray-950"><i class="fas fa-wand-magic-sparkles text-blue-600 mr-2"></i>AI 智能助理</h2>
                                <div class="flex items-center gap-1">
                                    <button onclick="clearChatHistory()" class="icon-btn" title="清空对话"><i class="fas fa-rotate-left"></i></button>
                                </div>
                            </div>
                            <div id="chatHistory"
                                class="flex-1 min-h-0 overflow-y-auto text-sm text-gray-700 bg-gradient-to-b from-slate-50 to-white p-4 rounded-lg border border-slate-100">
                                <div class="flex items-start mb-4">
                                    <div class="w-9 h-9 rounded-full bg-blue-50 text-blue-600 flex items-center justify-center mr-3 shrink-0">
                                        <i class="fas fa-robot"></i>
                                    </div>
                                    <span class="bg-white px-4 py-3 rounded-lg rounded-tl-none inline-block border border-slate-100 shadow-sm leading-6">我可以帮你搜索文件摘要，也能回答网盘里的资料问题。</span>
                                </div>
                            </div>
                            <div class="mt-4 border border-slate-200 rounded-lg bg-white p-3">
                                <div class="relative flex">
                                    <input type="text" id="chatInput" placeholder="输入问题，Enter 发送" onkeypress="handleChatKeyPress(event)"
                                        class="w-full pl-2 pr-12 py-2 rounded-lg bg-white focus:outline-none text-sm">
                                    <button id="chatSendBtn" onclick="sendChatMessage()"
                                        class="absolute right-0 top-0 w-10 h-10 rounded-lg bg-blue-600 text-white hover:bg-blue-700">
                                        <i class="fas fa-paper-plane"></i>
                                    </button>
                                    <button id="chatStopBtn" onclick="stopChatGeneration()" title="停止生成"
                                        class="hidden absolute right-0 top-0 w-10 h-10 rounded-lg bg-red-600 text-white hover:bg-red-700">
                                        <i class="fas fa-stop"></i>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </aside>
                </div>
            </main>
        </div>
    </div>

    <script src="/assets/js/state.js"></script>
    <script src="/assets/js/core.js"></script>
    <script src="/assets/js/files.js"></script>
    <script src="/assets/js/upload.js"></script>
    <script src="/assets/js/operations.js"></script>
    <script src="/assets/js/file-qa.js"></script>

<!-- Chat JS Logic -->
<script src="/assets/js/chat.js"></script>
<script src="/assets/js/bootstrap.js"></script>
</body>

</html>
