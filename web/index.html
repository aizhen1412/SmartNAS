<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartNAS | 你的私有智能云</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 SparkMD5 用于前端计算文件 Hash -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/spark-md5/3.0.2/spark-md5.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 1rem;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .file-item:hover {
            background: rgba(59, 130, 246, 0.05);
        }

        /* 模态框样式 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            z-index: 50;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 1rem;
            padding: 2rem;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            transform: translateY(-20px);
            opacity: 0;
            transition: all 0.3s ease;
        }

        .modal.active .modal-content {
            transform: translateY(0);
            opacity: 1;
        }
    </style>
</head>

<body class="p-4 md:p-8">
    <div class="max-w-6xl mx-auto">
        <!-- 顶部导航 -->
        <header class="flex justify-between items-center mb-8">
            <div class="flex items-center space-x-3">
                <div class="bg-blue-600 p-2 rounded-lg text-white">
                    <i class="fas fa-server text-2xl"></i>
                </div>
                <h1 class="text-2xl font-bold text-gray-800">SmartNAS</h1>
            </div>
            <!-- 动态显示区域 -->
            <div id="user-info" class="flex items-center space-x-4">
                <!-- 这里的内容由 JS 动态生成 -->
            </div>
        </header>

        <!-- 登录模态框 -->
        <div id="loginModal" class="modal">
            <div class="modal-content relative">
                <button onclick="closeModal('loginModal')"
                    class="absolute top-4 right-4 text-gray-400 hover:text-gray-600"><i
                        class="fas fa-times"></i></button>
                <h2 class="text-2xl font-bold mb-6 text-gray-800">欢迎回来</h2>
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">用户名</label>
                        <input type="text" id="loginUser"
                            class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-400 focus:outline-none"
                            placeholder="输入用户名">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">密码</label>
                        <input type="password" id="loginPwd"
                            class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-400 focus:outline-none"
                            placeholder="输入密码">
                    </div>
                    <button onclick="submitLogin()"
                        class="w-full bg-blue-600 text-white font-bold py-2 rounded-lg hover:bg-blue-700 transition mt-4">登录</button>
                </div>
            </div>
        </div>

        <!-- 注册模态框 -->
        <div id="registerModal" class="modal">
            <div class="modal-content relative">
                <button onclick="closeModal('registerModal')"
                    class="absolute top-4 right-4 text-gray-400 hover:text-gray-600"><i
                        class="fas fa-times"></i></button>
                <h2 class="text-2xl font-bold mb-6 text-gray-800">创建账号</h2>
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">用户名</label>
                        <input type="text" id="regUser"
                            class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-400 focus:outline-none"
                            placeholder="输入用户名">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">密码</label>
                        <input type="password" id="regPwd"
                            class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-400 focus:outline-none"
                            placeholder="输入密码">
                    </div>
                    <button onclick="submitRegister()"
                        class="w-full bg-green-500 text-white font-bold py-2 rounded-lg hover:bg-green-600 transition mt-4">注册</button>
                </div>
            </div>
        </div>

        <!-- 确认删除模态框 -->
        <div id="deleteModal" class="modal">
            <div class="modal-content relative text-center">
                <div class="mx-auto flex items-center justify-center h-12 w-12 rounded-full bg-red-100 mb-4">
                    <i class="fas fa-exclamation-triangle text-red-600 text-xl"></i>
                </div>
                <h3 class="text-lg leading-6 font-medium text-gray-900 mb-2">删除文件</h3>
                <div class="mt-2 mb-6">
                    <p class="text-sm text-gray-500">你确定要删除这个文件吗？此操作无法撤销。</p>
                </div>
                <div class="flex justify-center space-x-4">
                    <button onclick="closeModal('deleteModal')"
                        class="px-4 py-2 bg-gray-100 text-gray-700 rounded-lg hover:bg-gray-200 transition">取消</button>
                    <button id="confirmDeleteBtn"
                        class="px-4 py-2 bg-red-600 text-white rounded-lg hover:bg-red-700 transition">确认删除</button>
                </div>
            </div>
        </div>

        <!-- 提示消息 -->
        <div id="toast"
            class="fixed bottom-4 right-4 bg-gray-800 text-white px-6 py-3 rounded-lg shadow-lg transform transition-transform translate-y-20 opacity-0 z-50">
            <span id="toastMsg">提示内容</span>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-8">
            <aside class="space-y-6">
                <!-- 智能对话小窗 -->
                <div class="glass-card p-6 shadow-sm">
                    <h2 class="text-sm font-semibold text-gray-500 uppercase tracking-wider mb-4"><i
                            class="fas fa-robot text-blue-500 mr-2"></i> Qwen 智能助手</h2>
                    <div id="chatHistory"
                        class="space-y-3 mb-4 h-64 overflow-y-auto text-sm text-gray-700 bg-white/50 p-3 rounded-xl border border-gray-100">
                        <div class="flex items-start mb-2">
                            <i class="fas fa-robot text-blue-500 mt-1 mr-2"></i>
                            <span class="bg-blue-50 px-3 py-2 rounded-lg rounded-tl-none inline-block">我是 SmartNAS
                                的内置小助手 (基于千问 7B)，今天需要什么帮手？</span>
                        </div>
                    </div>
                    <div class="relative flex">
                        <input type="text" id="chatInput" placeholder="输入问题..." onkeypress="handleChatKeyPress(event)"
                            class="w-full pl-3 pr-10 py-2 rounded-xl bg-white border-2 border-transparent focus:border-blue-300 focus:outline-none focus:ring-0 text-sm">
                        <button id="chatSendBtn" onclick="sendChatMessage()"
                            class="absolute right-2 top-2 text-blue-500 hover:text-blue-700">
                            <i class="fas fa-paper-plane"></i>
                        </button>
                    </div>
                </div>

                <div class="glass-card p-6 shadow-sm">
                    <h2 class="text-sm font-semibold text-gray-500 uppercase tracking-wider mb-4">智能搜索</h2>
                    <div class="relative">
                        <input type="text" id="searchInput" oninput="applyFilterAndSort()" placeholder="试试搜索 '发票'..."
                            class="w-full pl-10 pr-4 py-2 rounded-xl bg-white border-none focus:ring-2 focus:ring-blue-400">
                        <i class="fas fa-magic absolute left-3 top-3 text-blue-400"></i>
                    </div>
                </div>
            </aside>

            <main class="lg:col-span-3">
                <div class="glass-card shadow-sm overflow-hidden">
                    <div class="p-6 border-b border-gray-100 flex justify-between items-center bg-white/50">
                        <h3 class="text-lg font-bold text-gray-800">全部文件</h3>
                        <div class="flex items-center space-x-4">
                            <label
                                class="cursor-pointer bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 transition flex items-center space-x-2 shadow-sm">
                                <i class="fas fa-cloud-upload-alt"></i>
                                <span class="font-medium">上传文件</span>
                                <input type="file" id="fileInput" class="hidden" onchange="uploadFile(this)">
                            </label>
                        </div>
                    </div>

                    <div
                        class="grid grid-cols-12 gap-4 px-6 py-3 bg-gray-50/80 text-xs font-bold text-gray-500 uppercase tracking-wider border-b border-gray-100 select-none">
                        <div class="col-span-5 flex items-center cursor-pointer hover:text-blue-600 transition"
                            onclick="toggleSort('name')">
                            名称 <i id="sortIcon_name" class="fas fa-sort ml-2 text-gray-300"></i>
                        </div>
                        <div class="col-span-3 flex items-center cursor-pointer hover:text-blue-600 transition"
                            onclick="toggleSort('time')">
                            上传时间 <i id="sortIcon_time" class="fas fa-sort ml-2 text-gray-300"></i>
                        </div>
                        <div class="col-span-2 flex items-center cursor-pointer hover:text-blue-600 transition"
                            onclick="toggleSort('size')">
                            大小 <i id="sortIcon_size" class="fas fa-sort ml-2 text-gray-300"></i>
                        </div>
                        <div class="col-span-2">操作</div>
                    </div>

                    <!-- 文件列表动态容器 -->
                    <div id="file-list" class="divide-y divide-gray-100">
                        <!-- 初始显示加载中 -->
                        <div class="p-8 text-center text-gray-400">正在连接服务器...</div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script>
        // --- 模态框逻辑 ---
        function openModal(id) {
            document.getElementById(id).classList.add('active');
        }
        function closeModal(id) {
            document.getElementById(id).classList.remove('active');
            // 清空输入框
            const inputs = document.getElementById(id).querySelectorAll('input');
            inputs.forEach(input => input.value = '');
        }

        const APP_PROTOCOL = window.location.protocol === 'https:' ? 'https:' : 'http:';
        const APP_HOST = window.location.hostname || 'localhost';
        const API_BASE = `${APP_PROTOCOL}//${APP_HOST}:8080`;
        const AGENT_BASE = `${APP_PROTOCOL}//${APP_HOST}:8081`;

        function showToast(msg, isError = false) {
            const toast = document.getElementById('toast');
            document.getElementById('toastMsg').innerText = msg;
            toast.style.backgroundColor = isError ? '#ef4444' : '#374151';
            toast.classList.remove('translate-y-20', 'opacity-0');
            setTimeout(() => {
                toast.classList.add('translate-y-20', 'opacity-0');
            }, 3000);
        }

        // --- 核心逻辑：UI 更新 ---
        let globalFiles = [];

        function checkAuth() {
            const user = localStorage.getItem('username');
            const token = getAuthToken();
            const userInfoDiv = document.getElementById('user-info');
            updateChatAuthState(Boolean(user && token));

            if (user && token) {
                userInfoDiv.innerHTML = `
                    <div class="flex items-center space-x-3">
                        <div class="w-8 h-8 bg-blue-100 rounded-full flex items-center justify-center text-blue-600 font-bold">
                            ${user[0].toUpperCase()}
                        </div>
                        <span class="text-gray-700 font-medium">${user}</span>
                        <button onclick="logout()" class="text-sm text-red-500 hover:underline">注销</button>
                    </div>
                `;
                fetchFileList(); // 登录状态下加载文件
            } else {
                userInfoDiv.innerHTML = `
                    <button onclick="openModal('loginModal')" class="px-4 py-2 text-blue-600 font-medium">登录</button>
                    <button onclick="openModal('registerModal')" class="px-6 py-2 bg-blue-600 text-white rounded-full shadow-lg hover:bg-blue-700 transition">注册</button>
                `;
                document.getElementById('file-list').innerHTML = '<div class="p-8 text-center text-gray-400">请先登录以查看文件</div>';
            }
        }

        function logout() {
            localStorage.removeItem('username');
            localStorage.removeItem('token');
            localStorage.removeItem('smartnas_token');
            location.reload(); // 刷新页面恢复初始状态
        }

        function getAuthToken() {
            const token = localStorage.getItem('token') || localStorage.getItem('smartnas_token');
            if (token && !localStorage.getItem('token')) {
                localStorage.setItem('token', token);
            }
            return token;
        }

        function updateChatAuthState(isAuthed) {
            const input = document.getElementById('chatInput');
            const sendButton = document.getElementById('chatSendBtn');
            if (!input || !sendButton) return;

            input.disabled = !isAuthed;
            input.placeholder = isAuthed ? '输入问题...' : '请先登录后使用 AI 助手';
            sendButton.disabled = !isAuthed;
            sendButton.classList.toggle('text-gray-300', !isAuthed);
            sendButton.classList.toggle('cursor-not-allowed', !isAuthed);
            sendButton.classList.toggle('text-blue-500', isAuthed);
            sendButton.classList.toggle('hover:text-blue-700', isAuthed);
        }

        // --- 核心逻辑：获取文件列表 ---
        async function fetchFileList() {
            const token = getAuthToken(); // 拿 JWT token
            if (!token) return;

            try {
                const response = await fetch(`${API_BASE}/api/list`, {
                    method: 'GET',
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (!response.ok) throw new Error("服务器拒绝访问");

                const files = await response.json();
                globalFiles = files;
                applyFilterAndSort();
            } catch (e) {
                console.error("获取失败:", e);
                document.getElementById('file-list').innerHTML = '<div class="p-8 text-center text-red-400">列表加载失败，请检查登录状态</div>';
            }
        }

        let currentSortField = 'time'; // 默认按时间
        let currentSortDesc = true;    // 默认降序

        function toggleSort(field) {
            if (currentSortField === field) {
                currentSortDesc = !currentSortDesc; // 切换升降序
            } else {
                currentSortField = field;
                currentSortDesc = false; // 新字段默认升序
            }
            updateSortIcons();
            applyFilterAndSort();
        }

        function updateSortIcons() {
            // 重置所有图标
            const nameIcon = document.getElementById('sortIcon_name');
            const sizeIcon = document.getElementById('sortIcon_size');
            const timeIcon = document.getElementById('sortIcon_time');
            if (nameIcon) nameIcon.className = "fas fa-sort ml-2 text-gray-300";
            if (sizeIcon) sizeIcon.className = "fas fa-sort ml-2 text-gray-300";
            if (timeIcon) timeIcon.className = "fas fa-sort ml-2 text-gray-300";

            const activeIcon = document.getElementById(`sortIcon_${currentSortField}`);
            if (activeIcon) {
                activeIcon.className = currentSortDesc ? "fas fa-sort-down ml-2 text-blue-600" : "fas fa-sort-up ml-2 text-blue-600";
            }
        }

        function applyFilterAndSort() {
            const query = (document.getElementById('searchInput').value || '').toLowerCase().trim();

            let filtered = globalFiles.filter(f => f.name.toLowerCase().includes(query));

            filtered.sort((a, b) => {
                let cmp = 0;
                if (currentSortField === 'name') {
                    cmp = a.name.localeCompare(b.name);
                } else if (currentSortField === 'size') {
                    cmp = a.rawSize - b.rawSize;
                } else {
                    cmp = a.uploadTime - b.uploadTime;
                }
                return currentSortDesc ? -cmp : cmp;
            });

            renderFiles(filtered);
        }

        // 格式化时间戳显示
        function formatUploadTime(timestamp) {
            if (!timestamp) return '-';
            // C++ time_since_epoch().count() 可能是纳秒或微秒级别
            let ms = timestamp;
            if (timestamp > 1e15) ms = Math.floor(timestamp / 1000000); // ns to ms
            else if (timestamp > 1e12 && timestamp < 1e15) ms = Math.floor(timestamp / 1000); // us to ms
            else if (timestamp < 1e11) ms = timestamp * 1000; // s to ms

            const d = new Date(ms);
            return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')} ${String(d.getHours()).padStart(2, '0')}:${String(d.getMinutes()).padStart(2, '0')}`;
        }

        function renderFiles(files) {
            const listDiv = document.getElementById('file-list');
            if (files.length === 0) {
                listDiv.innerHTML = '<div class="p-8 text-center text-gray-400">暂无文件</div>';
                return;
            }

            listDiv.innerHTML = files.map(file => `
                <div class="grid grid-cols-12 gap-4 px-6 py-4 items-center file-item transition">
                    <div class="col-span-5 flex items-center space-x-3 overflow-hidden">
                        <i class="far fa-file-alt text-blue-400 text-xl flex-shrink-0"></i>
                        <span class="text-sm font-medium text-gray-700 truncate" title="${file.name}">${file.name}</span>
                    </div>
                    <div class="col-span-3 text-sm text-gray-500">${formatUploadTime(file.uploadTime)}</div>
                    <div class="col-span-2 text-sm text-gray-500">${file.size}</div>
                    <div class="col-span-2 flex space-x-4 flex-shrink-0">                        <button onclick="previewByHash('${file.hash}')" class="text-green-500 hover:text-green-700 transition-colors" title="预览"><i class="fas fa-eye"></i></button>                        <button onclick="downloadByHash('${file.hash}')" class="text-blue-500 hover:text-blue-700 transition-colors" title="下载"><i class="fas fa-download"></i></button>
                        <button onclick="confirmDelete('${file.hash}')" class="text-red-400 hover:text-red-600 transition-colors" title="删除"><i class="fas fa-trash"></i></button>
                    </div>
                </div>
            `).join('');
        }

        // --- 之前实现的业务逻辑 ---
        async function submitLogin() {
            const user = document.getElementById('loginUser').value.trim();
            const pwd = document.getElementById('loginPwd').value.trim();
            if (!user || !pwd) {
                showToast("用户名和密码不能为空", true);
                return;
            }
            try {
                const response = await fetch(`${API_BASE}/login`, {
                    method: 'POST',
                    headers: { 'User': user, 'Password': pwd }
                });
                if (response.ok) {
                    localStorage.setItem('username', user); // 核心：保存登录态
                    const data = await response.json();
                    localStorage.setItem('token', data.token); // 保存 JWT token
                    closeModal('loginModal');
                    showToast("登录成功");
                    checkAuth(); // 立即更新 UI
                } else {
                    showToast("登录失败，请检查用户名或密码", true);
                }
            } catch (e) {
                console.error(e);
                showToast("网络请求失败", true);
            }
        }

        async function submitRegister() {
            const user = document.getElementById('regUser').value.trim();
            const pwd = document.getElementById('regPwd').value.trim();
            if (!user || !pwd) {
                showToast("用户名和密码不能为空", true);
                return;
            }
            try {
                const response = await fetch(`${API_BASE}/register`, {
                    method: 'POST',
                    headers: { 'User': user, 'Password': pwd }
                });
                const msg = await response.text();
                closeModal('registerModal');
                showToast(response.ok ? "注册成功，请重新登录" : msg, !response.ok);
            } catch (e) {
                console.error(e);
                showToast("网络请求失败", true);
            }
        }

        async function uploadFile(input) {
            const token = getAuthToken();
            if (!token) { showToast("请先登录", true); return; }

            const file = input.files[0];
            if (!file) return;

            const originalName = encodeURIComponent(file.name);
            const CHUNK_SIZE = 2 * 1024 * 1024; // 2MB
            const totalChunks = Math.ceil(file.size / CHUNK_SIZE);

            showToast("正在计算文件校验和...", false);

            // 计算文件的 MD5 hash（这里为了简单使用 MD5 模拟后端所需的 hash）
            // 注意：真实环境中推荐和后端 hash 算法一致，但此处我们用 MD5 作为文件唯一标识
            const fileHash = await calculateFileHash(file);

            showToast("正在校验文件状态...", false);

            try {
                // 1. 初始化上传：检查是否秒传，或需要哪些分片
                const initRes = await fetch(`${API_BASE}/api/upload/init?hash=${fileHash}&total=${totalChunks}`);
                const initData = await initRes.json();

                if (initData.status === "exists") { // 秒传逻辑由合并接口处理或在此截断
                    // 秒传可以直接调用 merge 让后端处理元数据
                    await fetch(`${API_BASE}/api/upload/merge`, {
                        method: 'POST',
                        headers: {
                            'Authorization': `Bearer ${token}`, 'File-Name': originalName,
                            'File-Hash': fileHash, 'Total-Chunks': totalChunks, 'File-Size': file.size
                        }
                    });
                    showToast("上传结果: Hit! Seconds-Transfer success.");
                    fetchFileList();
                    input.value = '';
                    return;
                }

                // 2. 上传缺失的分片
                const missingChunks = initData.missing || [];
                for (let i = 0; i < missingChunks.length; i++) {
                    const chunkIndex = missingChunks[i];
                    const start = chunkIndex * CHUNK_SIZE;
                    const end = Math.min(start + CHUNK_SIZE, file.size);
                    const chunk = file.slice(start, end);

                    showToast(`正在上传分片 ${i + 1}/${missingChunks.length}...`);

                    await fetch(`${API_BASE}/api/upload/chunk`, {
                        method: 'POST',
                        headers: {
                            'File-Hash': fileHash,
                            'Chunk-Index': chunkIndex
                        },
                        body: chunk
                    });
                }

                showToast("合并文件...");

                // 3. 通知后端合并分片
                const mergeRes = await fetch(`${API_BASE}/api/upload/merge`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}`, 'File-Name': originalName,
                        'File-Hash': fileHash, 'Total-Chunks': totalChunks, 'File-Size': file.size
                    }
                });
                const mergeData = await mergeRes.json();
                showToast("上传结果: " + mergeData.message);
                fetchFileList();
            } catch (e) {
                console.error(e);
                showToast("上传过程出错", true);
            } finally {
                input.value = '';
            }
        }

        // 辅助函数：计算大文件 Hash
        function calculateFileHash(file) {
            return new Promise((resolve, reject) => {
                const chunkSize = 2097152;
                const chunks = Math.ceil(file.size / chunkSize);
                let currentChunk = 0;
                const spark = new SparkMD5.ArrayBuffer();
                const fileReader = new FileReader();

                fileReader.onload = function (e) {
                    spark.append(e.target.result);
                    currentChunk++;
                    if (currentChunk < chunks) {
                        loadNext();
                    } else {
                        resolve(spark.end());
                    }
                };
                fileReader.onerror = function () {
                    reject("文件读取错误");
                };

                function loadNext() {
                    const start = currentChunk * chunkSize;
                    const end = ((start + chunkSize) >= file.size) ? file.size : start + chunkSize;
                    fileReader.readAsArrayBuffer(file.slice(start, end));
                }
                loadNext();
            });
        }

        function downloadByHash(hash) {
            const token = getAuthToken();
            if (!token) { showToast("请先登录", true); return; }
            window.open(`${API_BASE}/download?hash=${hash}&token=${token}`);
        }

        function previewByHash(hash) {
            const token = getAuthToken();
            if (!token) { showToast("请先登录", true); return; }
            window.open(`${API_BASE}/api/preview?hash=${hash}&token=${token}`, "_blank");
        }

        let fileToDelete = null;
        function confirmDelete(hash) {
            fileToDelete = hash;
            openModal('deleteModal');
            document.getElementById('confirmDeleteBtn').onclick = async () => {
                await deleteByHash(fileToDelete);
            };
        }

        async function deleteByHash(hash) {
            const token = getAuthToken();
            if (!token) {
                showToast("请先登录", true);
                closeModal('deleteModal');
                return;
            }

            try {
                const response = await fetch(`${API_BASE}/api/delete?hash=${hash}`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (response.ok) {
                    showToast("删除成功");
                    fetchFileList(); // 刷新列表
                } else {
                    showToast("删除失败或没有权限", true);
                }
            } catch (e) {
                console.error("删除出错:", e);
                showToast("删除异常", true);
            } finally {
                closeModal('deleteModal');
                fileToDelete = null;
            }
        }

        // 页面加载时初始化 UI
        window.onload = () => {
            checkAuth();
            updateSortIcons();
        };
    </script>
</body>

</html>
<!-- Chat JS Logic -->
<script>
    async function sendChatMessage() {
        const input = document.getElementById('chatInput');
        const text = input.value.trim();
        if (!text) return;

        const history = document.getElementById('chatHistory');

        // 追加用户的消息
        const userMsg = document.createElement('div');
        userMsg.className = 'flex items-start justify-end mb-2';
        userMsg.innerHTML = `<span class="bg-gray-100 px-3 py-2 rounded-lg rounded-tr-none inline-block text-right text-gray-800">${text}</span><i class="fas fa-user text-gray-400 mt-1 ml-2"></i>`;
        history.appendChild(userMsg);

        input.value = '';
        history.scrollTop = history.scrollHeight;

        // 追加一个 "思考中..." 提示
        const thinkingMsg = document.createElement('div');
        thinkingMsg.className = 'flex items-start mb-2 text-gray-400 text-xs italic thinking-msg';
        thinkingMsg.innerHTML = '<i class="fas fa-robot mt-1 mr-2"></i>思考中...';
        history.appendChild(thinkingMsg);
        history.scrollTop = history.scrollHeight;

        try {
            const token = getAuthToken();
            if (!token) {
                updateChatAuthState(false);
                throw new Error("请先登录后再使用 AI 助手");
            }
            const res = await fetch(`${AGENT_BASE}/api/agent/chat`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify({ prompt: text })
            });
            const data = await res.json();
            if (!res.ok) {
                throw new Error(data.detail || data.message || `AI 服务返回 ${res.status}`);
            }

            // 移除思考中
            const thinkNodes = history.querySelectorAll('.thinking-msg');
            thinkNodes.forEach(node => node.remove());

            // 准备 AI 回答气泡
            const aiMsg = document.createElement('div');
            aiMsg.className = 'flex items-start mb-2';
            aiMsg.innerHTML = `<i class="fas fa-robot text-blue-500 mt-1 mr-2"></i><span class="bg-blue-50 px-3 py-2 rounded-lg rounded-tl-none inline-block ai-text"></span>`;
            history.appendChild(aiMsg);
            const aiTextSpan = aiMsg.querySelector('.ai-text');

            if (data.status === "success") {
                aiTextSpan.innerHTML += data.response.replace(/\n/g, "<br>");
            } else {
                aiTextSpan.innerHTML += "Error: " + data.message;
            }
            history.scrollTop = history.scrollHeight;

        } catch (error) {
            console.error('Chat Error:', error);
            const thinkNodes = history.querySelectorAll('.thinking-msg');
            thinkNodes.forEach(node => node.remove());
            const errorMsg = document.createElement('div');
            errorMsg.className = 'flex items-start mb-2';
            const detail = error instanceof TypeError
                ? `AI 服务未启动或不可达，请确认 Agent 正在运行：${AGENT_BASE}`
                : error.message;
            errorMsg.innerHTML = `<i class="fas fa-robot text-red-500 mt-1 mr-2"></i><span class="bg-red-50 text-red-600 px-3 py-2 rounded-lg rounded-tl-none inline-block">抱歉，无法连接到 AI 引擎: ${detail}</span>`;
            history.appendChild(errorMsg);
        }
    }

    function handleChatKeyPress(e) {
        if (e.key === 'Enter') sendChatMessage();
    }
</script>
